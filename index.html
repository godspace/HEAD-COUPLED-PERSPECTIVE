<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Parallax - Гироскоп</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Интерфейс и кнопка запуска */
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); z-index: 10; color: white; text-align: center;
            backdrop-filter: blur(5px); transition: opacity 0.5s;
        }
        #ui-container h1 { margin-bottom: 10px; font-size: 24px; }
        #ui-container p { margin-bottom: 30px; color: #aaa; max-width: 80%; }
        
        button {
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: #007bff; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4); transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        
        #debug { position: absolute; top: 10px; left: 10px; color: #00ff00; font-family: monospace; z-index: 5; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Эффект 3D-глубины</h1>
        <p>Держите телефон перед собой. Нажмите "Старт", чтобы активировать гироскоп и заглянуть вглубь экрана.</p>
        <button id="startButton">СТАРТ</button>
    </div>

    <div id="debug">Ожидание...</div>

    <script>
        /* ==========================================
           1. НАСТРОЙКА 3D СЦЕНЫ (THREE.JS)
           ========================================== */
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.04); // Глубокий космический туман

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Для четкости на ретина-дисплеях
        document.body.appendChild(renderer.domElement);

        // Создаем парящие геометрические объекты (многогранники)
        const geometries = [
            new THREE.IcosahedronGeometry(1, 0),
            new THREE.OctahedronGeometry(1, 0),
            new THREE.TorusGeometry(0.8, 0.3, 16, 32)
        ];
        
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00d2ff, 
            wireframe: true, 
            emissive: 0x003366 
        });

        const objects = [];
        // Генерируем поле объектов
        for (let i = 0; i < 60; i++) {
            const geo = geometries[Math.floor(Math.random() * geometries.length)];
            const mesh = new THREE.Mesh(geo, material);
            
            // Распределяем их в пространстве случайным образом
            mesh.position.set(
                (Math.random() - 0.5) * 40, 
                (Math.random() - 0.5) * 40, 
                (Math.random() - 0.5) * 40 - 10 // Сдвигаем вглубь от камеры
            );
            
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            
            // Задаем случайную скорость вращения для каждого объекта
            mesh.userData.rotSpeedX = (Math.random() - 0.5) * 0.01;
            mesh.userData.rotSpeedY = (Math.random() - 0.5) * 0.01;
            
            scene.add(mesh);
            objects.push(mesh);
        }

        // Освещение
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00d2ff, 2, 50);
        pointLight.position.set(0, 0, 5);
        scene.add(pointLight);

        /* ==========================================
           2. ПЕРЕМЕННЫЕ ДЛЯ ГИРОСКОПА
           ========================================== */
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        const SENSITIVITY = 0.15; // Чувствительность наклона
        const LERP_FACTOR = 0.05; // Плавность сглаживания движений

        // Базовые значения для калибровки при старте
        let baseBeta = null;
        let baseGamma = null;

        const debugText = document.getElementById('debug');

        /* ==========================================
           3. ЗАПУСК И ОБРАБОТКА ДАТЧИКОВ
           ========================================== */
        const startButton = document.getElementById('startButton');
        const uiContainer = document.getElementById('ui-container');

        startButton.addEventListener('click', async () => {
            // Запрашиваем права для iOS 13+ устройств
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        initGyroscope();
                    } else {
                        alert('Доступ к гироскопу запрещен. Эффект работать не будет.');
                        return;
                    }
                } catch (error) {
                    console.error('Ошибка запроса прав:', error);
                }
            } else {
                // Для Android и остальных
                initGyroscope();
            }

            // Прячем меню
            uiContainer.style.opacity = '0';
            setTimeout(() => uiContainer.style.display = 'none', 500);
        });

        function initGyroscope() {
            window.addEventListener('deviceorientation', (event) => {
                // Инициализация базового угла, чтобы телефон в текущем положении считался "центром"
                if (baseBeta === null) {
                    baseBeta = event.beta;   // Наклон вперед-назад
                    baseGamma = event.gamma; // Наклон влево-вправо
                    debugText.innerText = "Датчики активны";
                }

                if (event.beta !== null && event.gamma !== null) {
                    // Считаем разницу между текущим углом и стартовым
                    let deltaBeta = event.beta - baseBeta;
                    let deltaGamma = event.gamma - baseGamma;

                    // Устраняем баг скачка при переходе gamma через 90/-90 градусов
                    if (deltaGamma > 180) deltaGamma -= 360;
                    if (deltaGamma < -180) deltaGamma += 360;

                    // Ограничиваем максимальный наклон математически (чтобы камера не улетала далеко)
                    deltaBeta = Math.max(-45, Math.min(45, deltaBeta));
                    deltaGamma = Math.max(-45, Math.min(45, deltaGamma));

                    // Передаем углы в целевые координаты камеры
                    // Инвертируем Y (beta), чтобы наклон телефона на себя поднимал обзор
                    targetX = deltaGamma * SENSITIVITY;
                    targetY = -deltaBeta * SENSITIVITY;
                }
            });
        }

        /* ==========================================
           4. ЦИКЛ АНИМАЦИИ (РЕНДЕР)
           ========================================== */
        function animate() {
            requestAnimationFrame(animate);

            // Анимация вращения объектов
            objects.forEach(mesh => {
                mesh.rotation.x += mesh.userData.rotSpeedX;
                mesh.rotation.y += mesh.userData.rotSpeedY;
            });

            // Плавное следование камеры за наклоном телефона (Интерполяция)
            currentX += (targetX - currentX) * LERP_FACTOR;
            currentY += (targetY - currentY) * LERP_FACTOR;

            camera.position.x = currentX;
            camera.position.y = currentY;
            camera.position.z = 5;

            // Камера всегда смотрит в центр сцены, создавая параллакс-искажение
            camera.lookAt(0, 0, -10);

            renderer.render(scene, camera);
        }

        // Адаптация под поворот экрана смартфона
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Запускаем цикл
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Pro: 6DoF Parallax</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: -apple-system, sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Заглушка ориентации */
        #landscape-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050510; color: white; z-index: 10000;
            justify-content: center; align-items: center; text-align: center;
            flex-direction: column; font-weight: bold; padding: 20px;
        }
        @media screen and (orientation: landscape) { #landscape-warning { display: flex; } }

        /* Стартовое меню */
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.9); z-index: 100; color: white; text-align: center;
            backdrop-filter: blur(10px); transition: opacity 0.5s;
        }
        #status { color: #e9c46a; font-weight: bold; margin-bottom: 25px; font-size: 14px; }
        button#startButton {
            padding: 16px 45px; font-size: 18px; font-weight: bold; color: #fff;
            background: #2a9d8f; border: none; border-radius: 12px; cursor: pointer;
        }

        /* Исчезающая панель настроек */
        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(25, 25, 25, 0.8); 
            padding: 15px; border-radius: 20px; color: white; z-index: 50;
            backdrop-filter: blur(10px); font-size: 12px; transition: opacity 0.4s, transform 0.4s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .controls-hidden { opacity: 0; transform: translate(-50%, 20px); pointer-events: none; }
        
        .control-group { margin-bottom: 10px; }
        .control-group label { display: flex; justify-content: space-between; margin-bottom: 4px; color: #aaa; }
        input[type="range"] { width: 100%; accent-color: #2a9d8f; }
        
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .checkbox-item { display: flex; align-items: center; font-size: 11px; color: #ddd; }
        .checkbox-item input { margin-right: 6px; width: 14px; height: 14px; }

        #webcam { 
            position: absolute; top: 10px; right: 10px; width: 80px; height: 60px; 
            transform: scaleX(-1); border-radius: 6px; background: #000; z-index: 10;
            border: 1px solid rgba(255,255,255,0.2); pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="landscape-warning">Пожалуйста, верните телефон в вертикальное положение 📱</div>

    <div id="ui-container">
        <h1>3D Portal Pro</h1>
        <div id="status">Готов к загрузке</div>
        <button id="startButton">СТАРТ</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <div id="controls">
        <div class="control-group">
            <label><span>ОБЩАЯ ЧУВСТВИТЕЛЬНОСТЬ:</span> <b id="globalVal">1.0</b></label>
            <input type="range" id="globalSens" min="0" max="3" step="0.1" value="1.0">
        </div>
        
        <div class="checkbox-grid">
            <div class="checkbox-item"><input type="checkbox" id="invFaceX"><label>Лицо: Инверсия X</label></div>
            <div class="checkbox-item"><input type="checkbox" id="invFaceY"><label>Лицо: Инверсия Y</label></div>
            <div class="checkbox-item"><input type="checkbox" id="invHeadX"><label>Взгляд: Инверсия X</label></div>
            <div class="checkbox-item"><input type="checkbox" id="invHeadY"><label>Взгляд: Инверсия Y</label></div>
            <div class="checkbox-item"><input type="checkbox" id="invGyroX" checked><label>Гиро: Инверсия X</label></div>
            <div class="checkbox-item"><input type="checkbox" id="invGyroY" checked><label>Гиро: Инверсия Y</label></div>
        </div>
        
        <div style="text-align:center; margin-top:10px; color:#666; font-size:10px;">Коснитесь экрана, чтобы скрыть/показать</div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- 3D SETUP ---
        const scene = new THREE.Scene();
        const cameraGroup = new THREE.Group();
        scene.add(cameraGroup);
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        cameraGroup.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Построение диорамы
        const room = new THREE.Mesh(
            new THREE.BoxGeometry(12, 8, 16),
            [
                new THREE.MeshStandardMaterial({ color: 0x2c3e50, side: THREE.BackSide }), // R
                new THREE.MeshStandardMaterial({ color: 0xc0392b, side: THREE.BackSide }), // L
                new THREE.MeshStandardMaterial({ color: 0xecf0f1, side: THREE.BackSide }), // T
                new THREE.MeshStandardMaterial({ color: 0x34495e, side: THREE.BackSide }), // B
                new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 }),            // F
                new THREE.MeshStandardMaterial({ color: 0xbdc3c7, side: THREE.BackSide })  // Back
            ]
        );
        room.position.z = -8;
        scene.add(room);

        const artifact = new THREE.Mesh(
            new THREE.TorusKnotGeometry(1, 0.3, 100, 16),
            new THREE.MeshStandardMaterial({ color: 0xf1c40f, metalness: 0.6, roughness: 0.2 })
        );
        artifact.position.set(0, 0, -8);
        scene.add(artifact);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(0, 3, -4);
        scene.add(light);

        // --- SENSORS & LOGIC ---
        let GLOBAL_MULT = 1.0;
        let baseBeta = null, baseGamma = null;
        let targetRotX = 0, targetRotY = 0, curRotX = 0, curRotY = 0;
        let targetPosX = 0, targetPosY = 0, curPosX = 0, curPosY = 0;
        let targetHeadRotX = 0, targetHeadRotY = 0, curHeadRotX = 0, curHeadRotY = 0;

        const uiStart = document.getElementById('ui-container');
        const startBtn = document.getElementById('startButton');
        const statusText = document.getElementById('status');
        const controls = document.getElementById('controls');
        let faceLandmarker, lastTime = -1;

        // Авто-скрытие меню
        let hideTimeout;
        function showControls() {
            controls.classList.remove('controls-hidden');
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => controls.classList.add('controls-hidden'), 3500);
        }
        window.addEventListener('touchstart', showControls);
        document.getElementById('globalSens').oninput = (e) => {
            GLOBAL_MULT = e.target.value;
            document.getElementById('globalVal').innerText = GLOBAL_MULT;
            showControls();
        };

        startBtn.onclick = async () => {
            startBtn.disabled = true;
            try {
                // Блокировка ориентации (Android)
                try {
                    if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                    if (screen.orientation?.lock) await screen.orientation.lock("portrait");
                } catch(e) {}

                statusText.innerText = "Загрузка модулей...";
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.0/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `face_landmarker.task`, delegate: "CPU" },
                    outputFacialTransformationMatrixes: true, runningMode: "VIDEO", numFaces: 1
                });

                statusText.innerText = "Запуск камеры...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('webcam').srcObject = stream;

                initGyro();
                uiStart.style.opacity = '0';
                setTimeout(() => { uiStart.style.display = 'none'; showControls(); animate(); }, 500);
            } catch (e) { statusText.innerText = "Ошибка: " + e.message; startBtn.disabled = false; }
        };

        function initGyro() {
            window.addEventListener('deviceorientation', (e) => {
                if (baseBeta === null) { baseBeta = e.beta; baseGamma = e.gamma; }
                let dX = e.beta - baseBeta;
                let dY = e.gamma - baseGamma;
                if (dY > 180) dY -= 360; if (dY < -180) dY += 360;
                
                let invX = document.getElementById('invGyroX').checked ? 1 : -1;
                let invY = document.getElementById('invGyroY').checked ? 1 : -1;
                targetRotX = invX * dX * 0.015 * GLOBAL_MULT;
                targetRotY = invY * dY * 0.015 * GLOBAL_MULT;
            });
        }

        async function predict() {
            const video = document.getElementById('webcam');
            if (video.currentTime !== lastTime) {
                lastTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.facialTransformationMatrixes?.length > 0) {
                    const m = results.facialTransformationMatrixes[0].data;
                    
                    // Смещение (Тело)
                    let tx = m[12] / 30, ty = m[13] / 30;
                    if (document.getElementById('invFaceX').checked) tx = -tx;
                    if (document.getElementById('invFaceY').checked) ty = -ty;
                    targetPosX = tx * 3 * GLOBAL_MULT;
                    targetPosY = ty * 3 * GLOBAL_MULT;

                    // Поворот (Взгляд)
                    const euler = new THREE.Euler().setFromRotationMatrix(new THREE.Matrix4().fromArray(m));
                    let rx = euler.x, ry = -euler.y;
                    if (document.getElementById('invHeadX').checked) rx = -rx;
                    if (document.getElementById('invHeadY').checked) ry = -ry;
                    targetHeadRotX = rx * 1.0 * GLOBAL_MULT;
                    targetHeadRotY = ry * 1.0 * GLOBAL_MULT;
                }
            }
            requestAnimationFrame(predict);
        }

        function animate() {
            requestAnimationFrame(animate);
            artifact.rotation.y += 0.01;

            const lerp = 0.1;
            curRotX += (targetRotX - curRotX) * lerp;
            curRotY += (targetRotY - curRotY) * lerp;
            cameraGroup.rotation.set(curRotX, curRotY, 0);

            curPosX += (targetPosX - curPosX) * lerp;
            curPosY += (targetPosY - curPosY) * lerp;
            camera.position.set(curPosX, curPosY, 0);

            curHeadRotX += (targetHeadRotX - curHeadRotX) * lerp;
            curHeadRotY += (targetHeadRotY - curHeadRotY) * lerp;
            camera.rotation.set(curHeadRotX, curHeadRotY, 0);

            renderer.render(scene, camera);
        }
        predict();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>

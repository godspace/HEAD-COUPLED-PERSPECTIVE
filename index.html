<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Комната - Гироскоп</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.85); z-index: 10; color: white; text-align: center;
            backdrop-filter: blur(8px); transition: opacity 0.5s;
        }
        #ui-container h1 { margin-bottom: 10px; font-size: 26px; }
        #ui-container p { margin-bottom: 30px; color: #ccc; max-width: 80%; line-height: 1.5; }
        
        button {
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: #e63946; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4); transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Загляни внутрь</h1>
        <p>Держите телефон ровно перед собой. Нажмите "Старт" и наклоняйте устройство, чтобы осмотреть комнату.</p>
        <button id="startButton">СТАРТ</button>
    </div>

    <script>
        /* ==========================================
           1. НАСТРОЙКА 3D СЦЕНЫ И ТЕНЕЙ
           ========================================== */
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        // Камера стоит ровно на границе "экрана" (z = 0)
        camera.position.set(0, 0, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // Включаем реалистичные тени
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        /* ==========================================
           2. СОЗДАЕМ КОМНАТУ (ДИОРАМУ)
           ========================================== */
        const roomWidth = 12;
        const roomHeight = 8;
        const roomDepth = 16; // Глубина комнаты
        
        const roomGeo = new THREE.BoxGeometry(roomWidth, roomHeight, roomDepth);
        
        // Красим каждую стену в свой цвет для лучшего ощущения перспективы
        // Порядок в Three.js: Right, Left, Top, Bottom, Front(к камере), Back(дальняя)
        const roomMaterials = [
            new THREE.MeshStandardMaterial({ color: 0x457b9d, side: THREE.BackSide }), // Правая (синяя)
            new THREE.MeshStandardMaterial({ color: 0xe63946, side: THREE.BackSide }), // Левая (красная)
            new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide }), // Потолок (белый)
            new THREE.MeshStandardMaterial({ color: 0x1d3557, side: THREE.BackSide }), // Пол (тёмно-синий)
            new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.BackSide }), // Передняя (НЕВИДИМАЯ)
            new THREE.MeshStandardMaterial({ color: 0xa8dadc, side: THREE.BackSide })  // Дальняя стена (светлая)
        ];

        const room = new THREE.Mesh(roomGeo, roomMaterials);
        room.receiveShadow = true; // Стены получают тени
        // Сдвигаем комнату так, чтобы её открытая (невидимая) часть была ровно там, где стоит камера
        room.position.z = -roomDepth / 2; 
        scene.add(room);

        // Сетка на пол (плитка), чтобы глазам было за что зацепиться
        const grid = new THREE.GridHelper(roomWidth, 10, 0xffffff, 0xffffff);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        grid.position.set(0, -roomHeight / 2 + 0.01, -roomDepth / 2);
        scene.add(grid);

        /* ==========================================
           3. НАПОЛНЯЕМ КОМНАТУ ОБЪЕКТАМИ
           ========================================== */
        // Пьедестал по центру
        const pedestalGeo = new THREE.CylinderGeometry(1, 1.2, 3, 32);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        pedestal.position.set(0, -roomHeight / 2 + 1.5, -roomDepth / 2);
        pedestal.castShadow = true;
        pedestal.receiveShadow = true;
        scene.add(pedestal);

        // Парящий артефакт над пьедесталом
        const artifactGeo = new THREE.TorusKnotGeometry(0.8, 0.25, 100, 16);
        const artifactMat = new THREE.MeshStandardMaterial({ color: 0xffb703, metalness: 0.7, roughness: 0.2 });
        const artifact = new THREE.Mesh(artifactGeo, artifactMat);
        artifact.position.set(0, -roomHeight / 2 + 4.5, -roomDepth / 2);
        artifact.castShadow = true;
        scene.add(artifact);

        // Картина на дальней стене
        const frameGeo = new THREE.BoxGeometry(4, 3, 0.2);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.position.set(0, 1, -roomDepth + 0.1);
        frame.castShadow = true;
        scene.add(frame);

        const canvasGeo = new THREE.PlaneGeometry(3.6, 2.6);
        const canvasMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x457b9d, emissiveIntensity: 0.5 });
        const canvasMesh = new THREE.Mesh(canvasGeo, canvasMat);
        canvasMesh.position.set(0, 1, -roomDepth + 0.21);
        scene.add(canvasMesh);

        /* ==========================================
           4. ОСВЕЩЕНИЕ
           ========================================== */
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4); // Общий мягкий свет
        scene.add(ambientLight);

        // Лампа светит сверху вниз в центре комнаты
        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(0, roomHeight / 2 - 1, -roomDepth / 2);
        spotLight.angle = Math.PI / 4;
        spotLight.penumbra = 0.5;
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);

        /* ==========================================
           5. ГИРОСКОП И ЛОГИКА КАМЕРЫ
           ========================================== */
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        const SENSITIVITY = 0.08; // Делаем чуть меньше, чтобы не "высунуть голову" сквозь стены
        const LERP_FACTOR = 0.06;

        let baseBeta = null;
        let baseGamma = null;

        const startButton = document.getElementById('startButton');
        const uiContainer = document.getElementById('ui-container');

        startButton.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        initGyroscope();
                    } else {
                        alert('Доступ к гироскопу запрещен.');
                        return;
                    }
                } catch (error) {
                    console.error('Ошибка прав:', error);
                }
            } else {
                initGyroscope();
            }

            uiContainer.style.opacity = '0';
            setTimeout(() => uiContainer.style.display = 'none', 500);
        });

        function initGyroscope() {
            window.addEventListener('deviceorientation', (event) => {
                if (baseBeta === null) {
                    baseBeta = event.beta;
                    baseGamma = event.gamma;
                }

                if (event.beta !== null && event.gamma !== null) {
                    let deltaBeta = event.beta - baseBeta;
                    let deltaGamma = event.gamma - baseGamma;

                    if (deltaGamma > 180) deltaGamma -= 360;
                    if (deltaGamma < -180) deltaGamma += 360;

                    // Ограничиваем наклон камеры, чтобы не выйти за пределы передней рамы
                    deltaBeta = Math.max(-35, Math.min(35, deltaBeta));
                    deltaGamma = Math.max(-40, Math.min(40, deltaGamma));

                    targetX = deltaGamma * SENSITIVITY;
                    targetY = -deltaBeta * SENSITIVITY;
                }
            });
        }

        /* ==========================================
           6. АНИМАЦИЯ
           ========================================== */
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // Плавно вращаем и качаем артефакт
            artifact.rotation.x += 0.01;
            artifact.rotation.y += 0.015;
            artifact.position.y = (-roomHeight / 2 + 4.5) + Math.sin(elapsedTime * 2) * 0.3;

            // Плавно смещаем камеру за гироскопом
            currentX += (targetX - currentX) * LERP_FACTOR;
            currentY += (targetY - currentY) * LERP_FACTOR;

            camera.position.x = currentX;
            camera.position.y = currentY;

            // Ключевой момент для иллюзии окна: камера всегда смотрит в дальний центр комнаты
            camera.lookAt(currentX * 0.3, currentY * 0.3, -roomDepth);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

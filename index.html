<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Parallax: Полная Калибровка</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.85); z-index: 20; color: white; text-align: center;
            backdrop-filter: blur(8px); transition: opacity 0.5s;
        }
        #ui-container h1 { margin-bottom: 10px; font-size: 26px; }
        #ui-container p { margin-bottom: 30px; color: #ccc; max-width: 80%; line-height: 1.5; }
        
        button#startButton {
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: #2a9d8f; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(42, 157, 143, 0.4); transition: transform 0.2s;
        }
        button#startButton:active { transform: scale(0.95); }
        button#startButton:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        /* Панель настроек внизу экрана */
        #controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
            background: rgba(20, 20, 20, 0.85); padding: 10px 15px; box-sizing: border-box;
            border-top: 1px solid #444; color: white; z-index: 10; display: none;
            backdrop-filter: blur(5px); font-size: 13px; overflow-y: auto;
        }
        .control-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .control-group label { margin-bottom: 4px; display: flex; justify-content: space-between; }
        .control-group input[type="range"] { width: 100%; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 6px; }
        .checkbox-group input { margin-right: 8px; width: 16px; height: 16px; }

        /* Сетка для чекбоксов, чтобы было компактнее */
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin-top: 10px;
        }

        /* Маленькое превью камеры */
        #webcam { 
            position: absolute; top: 15px; right: 15px; 
            width: 100px; height: 75px; 
            transform: scaleX(-1); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 8px; background: #222; z-index: 5; object-fit: cover;
        }
        #status { color: #e9c46a; font-weight: bold; margin-bottom: 20px; height: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Полная калибровка</h1>
        <p>Разрешите доступ к камере и гироскопу. После старта настройте все 4 оси.</p>
        <div id="status">Загрузка нейросети...</div>
        <button id="startButton" disabled>СТАРТ</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <div id="controls">
        <div class="control-group">
            <label><span>Чувств. лица (MediaPipe):</span> <span id="faceVal">3.0</span></label>
            <input type="range" id="faceSens" min="0" max="10" step="0.1" value="3.0">
        </div>
        <div class="control-group">
            <label><span>Чувств. гироскопа:</span> <span id="gyroVal">0.015</span></label>
            <input type="range" id="gyroSens" min="0" max="0.05" step="0.001" value="0.015">
        </div>
        
        <div class="checkbox-grid">
            <div class="checkbox-group">
                <input type="checkbox" id="invertFaceX" checked>
                <label for="invertFaceX">Лицо X (Влево/Вправо)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="invertFaceY">
                <label for="invertFaceY">Лицо Y (Вверх/Вниз)</label>
            </div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="invertGyroY">
                <label for="invertGyroY">Гироскоп Y (Влево/Вправо)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="invertGyroX">
                <label for="invertGyroX">Гироскоп X (Вверх/Вниз)</label>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        /* ==========================================
           1. НАСТРОЙКА 3D СЦЕНЫ И КОМНАТЫ
           ========================================== */
        const scene = new THREE.Scene();

        const cameraGroup = new THREE.Group();
        scene.add(cameraGroup);
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        cameraGroup.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const roomGeo = new THREE.BoxGeometry(12, 8, 16);
        const roomMaterials = [
            new THREE.MeshStandardMaterial({ color: 0x457b9d, side: THREE.BackSide }), 
            new THREE.MeshStandardMaterial({ color: 0xe63946, side: THREE.BackSide }), 
            new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide }), 
            new THREE.MeshStandardMaterial({ color: 0x1d3557, side: THREE.BackSide }), 
            new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.BackSide }), 
            new THREE.MeshStandardMaterial({ color: 0xa8dadc, side: THREE.BackSide })  
        ];
        const room = new THREE.Mesh(roomGeo, roomMaterials);
        room.receiveShadow = true;
        room.position.z = -8; 
        scene.add(room);

        const grid = new THREE.GridHelper(12, 10, 0xffffff, 0xffffff);
        grid.material.opacity = 0.2; grid.material.transparent = true;
        grid.position.set(0, -3.99, -8);
        scene.add(grid);

        const artifactGeo = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const artifactMat = new THREE.MeshStandardMaterial({ color: 0xffb703, metalness: 0.8, roughness: 0.2 });
        const artifact = new THREE.Mesh(artifactGeo, artifactMat);
        artifact.position.set(0, 0, -8);
        artifact.castShadow = true;
        scene.add(artifact);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(0, 3, -4);
        spotLight.castShadow = true;
        scene.add(spotLight);

        /* ==========================================
           2. ПЕРЕМЕННЫЕ И ЭЛЕМЕНТЫ УПРАВЛЕНИЯ
           ========================================== */
        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;
        let baseBeta = null, baseGamma = null;

        let targetPosX = 0, targetPosY = 0;
        let currentPosX = 0, currentPosY = 0;

        let GYRO_SENSITIVITY = 0.015; 
        let FACE_SENSITIVITY = 3.0;   
        const LERP_FACTOR = 0.08;

        // Привязываем UI
        const faceInput = document.getElementById('faceSens');
        const gyroInput = document.getElementById('gyroSens');
        
        const invertFaceXCheckbox = document.getElementById('invertFaceX');
        const invertFaceYCheckbox = document.getElementById('invertFaceY');
        const invertGyroYCheckbox = document.getElementById('invertGyroY');
        const invertGyroXCheckbox = document.getElementById('invertGyroX');
        
        faceInput.addEventListener('input', (e) => {
            FACE_SENSITIVITY = parseFloat(e.target.value);
            document.getElementById('faceVal').innerText = FACE_SENSITIVITY.toFixed(1);
        });
        
        gyroInput.addEventListener('input', (e) => {
            GYRO_SENSITIVITY = parseFloat(e.target.value);
            document.getElementById('gyroVal').innerText = GYRO_SENSITIVITY.toFixed(3);
        });

        /* ==========================================
           3. ИНИЦИАЛИЗАЦИЯ И ЗАПУСК
           ========================================== */
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startButton');
        const statusText = document.getElementById('status');
        let faceLandmarker;
        let lastVideoTime = -1;

        async function loadModels() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
                    outputFaceBlendshapes: false, runningMode: "VIDEO", numFaces: 1
                });
                statusText.innerText = "Нейросеть готова. Нажмите СТАРТ.";
                statusText.style.color = "#2a9d8f";
                startBtn.disabled = false;
            } catch (e) {
                statusText.innerText = "Ошибка загрузки нейросети.";
                statusText.style.color = "#e63946";
            }
        }
        loadModels();

        startBtn.addEventListener('click', async () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') initGyro();
                } catch (e) { console.error(e); }
            } else {
                initGyro();
            }

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", () => predictWebcam());
                }).catch(() => alert("Без камеры будет работать только гироскоп."));

            document.getElementById('ui-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-container').style.display = 'none';
                document.getElementById('controls').style.display = 'block'; 
            }, 500);
        });

        /* ==========================================
           4. ЛОГИКА ДАТЧИКОВ (С УЧЕТОМ НАСТРОЕК)
           ========================================== */
        function initGyro() {
            window.addEventListener('deviceorientation', (event) => {
                if (baseBeta === null) { baseBeta = event.beta; baseGamma = event.gamma; }
                if (event.beta !== null && event.gamma !== null) {
                    let deltaBeta = event.beta - baseBeta;
                    let deltaGamma = event.gamma - baseGamma;

                    if (deltaGamma > 180) deltaGamma -= 360;
                    if (deltaGamma < -180) deltaGamma += 360;
                    deltaBeta = Math.max(-35, Math.min(35, deltaBeta));
                    deltaGamma = Math.max(-40, Math.min(40, deltaGamma));

                    // Учитываем галочки инверсии гироскопа
                    let gyroDirY = invertGyroYCheckbox.checked ? 1 : -1;
                    let gyroDirX = invertGyroXCheckbox.checked ? 1 : -1;

                    targetRotY = gyroDirY * deltaGamma * GYRO_SENSITIVITY;
                    targetRotX = gyroDirX * deltaBeta * GYRO_SENSITIVITY;
                }
            });
        }

        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks.length > 0) {
                    const nose = results.faceLandmarks[0][1];
                    
                    // Учитываем галочки инверсии для лица
                    let rawX = (nose.x - 0.5) * 2; 
                    if (invertFaceXCheckbox.checked) rawX = -rawX; 
                    
                    let rawY = -(nose.y - 0.5) * 2; 
                    if (invertFaceYCheckbox.checked) rawY = -rawY;

                    targetPosX = rawX * FACE_SENSITIVITY;
                    targetPosY = rawY * FACE_SENSITIVITY;
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        /* ==========================================
           5. АНИМАЦИЯ И РЕНДЕР
           ========================================== */
        function animate() {
            requestAnimationFrame(animate);

            artifact.rotation.x += 0.01;
            artifact.rotation.y += 0.015;

            currentRotX += (targetRotX - currentRotX) * LERP_FACTOR;
            currentRotY += (targetRotY - currentRotY) * LERP_FACTOR;
            cameraGroup.rotation.x = currentRotX;
            cameraGroup.rotation.y = currentRotY;

            currentPosX += (targetPosX - currentPosX) * LERP_FACTOR;
            currentPosY += (targetPosY - currentPosY) * LERP_FACTOR;
            camera.position.x = currentPosX;
            camera.position.y = currentPosY;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ultimate 3D Parallax: Face + Gyro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.85); z-index: 10; color: white; text-align: center;
            backdrop-filter: blur(8px); transition: opacity 0.5s;
        }
        #ui-container h1 { margin-bottom: 10px; font-size: 26px; }
        #ui-container p { margin-bottom: 30px; color: #ccc; max-width: 80%; line-height: 1.5; }
        
        button {
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: #2a9d8f; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(42, 157, 143, 0.4); transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        /* Маленькое превью камеры для контроля */
        #webcam { 
            position: absolute; bottom: 15px; right: 15px; 
            width: 120px; height: 90px; 
            transform: scaleX(-1); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 8px; background: #222; z-index: 5;
            object-fit: cover;
        }
        #status { color: #e9c46a; font-weight: bold; margin-bottom: 20px; height: 20px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Полное погружение</h1>
        <p>Держите телефон ровно перед лицом. Разрешите доступ к камере и гироскопу.</p>
        <div id="status">Загрузка нейросети...</div>
        <button id="startButton" disabled>СТАРТ</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        /* ==========================================
           1. НАСТРОЙКА 3D СЦЕНЫ
           ========================================== */
        const scene = new THREE.Scene();

        // Создаем группу "Голова" (для гироскопа) и саму камеру (для лица)
        const cameraGroup = new THREE.Group();
        scene.add(cameraGroup);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        cameraGroup.add(camera); // Камера теперь внутри группы

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        /* ==========================================
           2. СОЗДАЕМ ДИОРАМУ (КОМНАТУ)
           ========================================== */
        const roomGeo = new THREE.BoxGeometry(12, 8, 16);
        const roomMaterials = [
            new THREE.MeshStandardMaterial({ color: 0x457b9d, side: THREE.BackSide }), // Право
            new THREE.MeshStandardMaterial({ color: 0xe63946, side: THREE.BackSide }), // Лево
            new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide }), // Верх
            new THREE.MeshStandardMaterial({ color: 0x1d3557, side: THREE.BackSide }), // Низ
            new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.BackSide }), // Перед (невидимый)
            new THREE.MeshStandardMaterial({ color: 0xa8dadc, side: THREE.BackSide })  // Тыл
        ];
        const room = new THREE.Mesh(roomGeo, roomMaterials);
        room.receiveShadow = true;
        room.position.z = -8; 
        scene.add(room);

        const grid = new THREE.GridHelper(12, 10, 0xffffff, 0xffffff);
        grid.material.opacity = 0.2; grid.material.transparent = true;
        grid.position.set(0, -3.99, -8);
        scene.add(grid);

        // Центральный объект
        const artifactGeo = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const artifactMat = new THREE.MeshStandardMaterial({ color: 0xffb703, metalness: 0.8, roughness: 0.2 });
        const artifact = new THREE.Mesh(artifactGeo, artifactMat);
        artifact.position.set(0, 0, -8);
        artifact.castShadow = true;
        scene.add(artifact);

        // Освещение
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(0, 3, -4);
        spotLight.castShadow = true;
        scene.add(spotLight);

        /* ==========================================
           3. ПЕРЕМЕННЫЕ ДЛЯ ДАТЧИКОВ
           ========================================== */
        // Цели для гироскопа (Вращение)
        let targetRotX = 0, targetRotY = 0;
        let currentRotX = 0, currentRotY = 0;
        let baseBeta = null, baseGamma = null;

        // Цели для MediaPipe (Смещение)
        let targetPosX = 0, targetPosY = 0;
        let currentPosX = 0, currentPosY = 0;

        // Настройки чувствительности
        const GYRO_SENSITIVITY = 0.015; // Радианы вращения
        const FACE_SENSITIVITY = 3.0;   // Единицы смещения в 3D
        const LERP_FACTOR = 0.08;

        /* ==========================================
           4. ИНИЦИАЛИЗАЦИЯ MEDIAPIPE И КАМЕРЫ
           ========================================== */
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startButton');
        const statusText = document.getElementById('status');
        let faceLandmarker;
        let lastVideoTime = -1;

        async function loadModels() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: false,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                statusText.innerText = "Нейросеть готова. Нажмите СТАРТ.";
                statusText.style.color = "#2a9d8f";
                startBtn.disabled = false;
            } catch (e) {
                statusText.innerText = "Ошибка загрузки нейросети.";
                statusText.style.color = "#e63946";
            }
        }

        // Запускаем загрузку моделей сразу
        loadModels();

        /* ==========================================
           5. КНОПКА СТАРТ: ЗАПУСК ВСЕХ СИСТЕМ
           ========================================== */
        startBtn.addEventListener('click', async () => {
            // 1. Запрос гироскопа (iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') initGyro();
                } catch (e) { console.error(e); }
            } else {
                initGyro();
            }

            // 2. Запуск веб-камеры
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", () => {
                        predictWebcam();
                    });
                })
                .catch((err) => {
                    alert("Без камеры будет работать только гироскоп.");
                });

            document.getElementById('ui-container').style.opacity = '0';
            setTimeout(() => document.getElementById('ui-container').style.display = 'none', 500);
        });

        /* ==========================================
           6. ЛОГИКА ДАТЧИКОВ
           ========================================== */
        function initGyro() {
            window.addEventListener('deviceorientation', (event) => {
                if (baseBeta === null) {
                    baseBeta = event.beta;
                    baseGamma = event.gamma;
                }
                if (event.beta !== null && event.gamma !== null) {
                    let deltaBeta = event.beta - baseBeta;
                    let deltaGamma = event.gamma - baseGamma;

                    if (deltaGamma > 180) deltaGamma -= 360;
                    if (deltaGamma < -180) deltaGamma += 360;

                    deltaBeta = Math.max(-35, Math.min(35, deltaBeta));
                    deltaGamma = Math.max(-40, Math.min(40, deltaGamma));

                    // Гироскоп задает целевое ВРАЩЕНИЕ группы (в радианах)
                    // Наклон телефона влево-вправо вращает камеру по оси Y
                    targetRotY = -deltaGamma * GYRO_SENSITIVITY;
                    // Наклон вверх-вниз вращает камеру по оси X
                    targetRotX = -deltaBeta * GYRO_SENSITIVITY;
                }
            });
        }

        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.faceLandmarks.length > 0) {
                    const nose = results.faceLandmarks[0][1];
                    const mappedX = ((1 - nose.x) - 0.5) * 2; 
                    const mappedY = -(nose.y - 0.5) * 2; 

                    // Камера задает целевое СМЕЩЕНИЕ внутри группы
                    targetPosX = mappedX * FACE_SENSITIVITY;
                    targetPosY = mappedY * FACE_SENSITIVITY;
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        /* ==========================================
           7. АНИМАЦИЯ И РЕНДЕР
           ========================================== */
        function animate() {
            requestAnimationFrame(animate);

            // Анимация артефакта
            artifact.rotation.x += 0.01;
            artifact.rotation.y += 0.015;

            // 1. Сглаживание и применение гироскопа (Вращение группы)
            currentRotX += (targetRotX - currentRotX) * LERP_FACTOR;
            currentRotY += (targetRotY - currentRotY) * LERP_FACTOR;
            cameraGroup.rotation.x = currentRotX;
            cameraGroup.rotation.y = currentRotY;

            // 2. Сглаживание и применение камеры (Смещение самой камеры)
            currentPosX += (targetPosX - currentPosX) * LERP_FACTOR;
            currentPosY += (targetPosY - currentPosY) * LERP_FACTOR;
            camera.position.x = currentPosX;
            camera.position.y = currentPosY;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

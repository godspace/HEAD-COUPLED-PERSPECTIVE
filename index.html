<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Свободная камера: 6DoF + Гироскоп</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.85); z-index: 20; color: white; text-align: center;
            backdrop-filter: blur(8px); transition: opacity 0.5s;
        }
        #ui-container h1 { margin-bottom: 10px; font-size: 26px; }
        #ui-container p { margin-bottom: 20px; color: #ccc; max-width: 80%; line-height: 1.5; }
        
        #status {
            color: #e9c46a; font-weight: bold; margin-bottom: 25px; 
            min-height: 20px; font-size: 16px;
        }

        button#startButton {
            padding: 15px 40px; font-size: 18px; font-weight: bold; color: #fff;
            background: #2a9d8f; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(42, 157, 143, 0.4); transition: transform 0.2s;
        }
        button#startButton:active { transform: scale(0.95); }
        button#startButton:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        #controls {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 45%;
            background: rgba(20, 20, 20, 0.85); padding: 10px 15px; box-sizing: border-box;
            border-top: 1px solid #444; color: white; z-index: 10; display: none;
            backdrop-filter: blur(5px); font-size: 13px; overflow-y: auto;
        }
        .control-group { margin-bottom: 8px; display: flex; flex-direction: column; }
        .control-group label { margin-bottom: 4px; display: flex; justify-content: space-between; color: #ddd; }
        .control-group input[type="range"] { width: 100%; }
        
        .master-group label { color: #e9c46a; font-weight: bold; }
        
        .checkbox-group { display: flex; align-items: center; margin-bottom: 6px; }
        .checkbox-group input { margin-right: 8px; width: 16px; height: 16px; }

        .checkbox-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px;
        }

        #webcam { 
            position: absolute; top: 15px; right: 15px; width: 100px; height: 75px; 
            transform: scaleX(-1); border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 8px; background: #222; z-index: 5; object-fit: cover;
        }
        /* Заглушка при повороте экрана */
        #landscape-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050510; color: white; z-index: 9999;
            justify-content: center; align-items: center; text-align: center;
            flex-direction: column; font-size: 22px; font-weight: bold;
        }
        /* Медиа-запрос: если экран шире, чем его высота (альбомная ориентация) */
        @media screen and (orientation: landscape) {
            #landscape-warning { display: flex; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Свободная камера</h1>
        <p>Повороты головы вращают обзор, смещение тела — двигает камеру.</p>
        <div id="status">Нажмите СТАРТ для загрузки модулей</div>
        <button id="startButton">СТАРТ</button>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <div id="controls">
        <div class="control-group master-group">
            <label><span>ОБЩАЯ ЧУВСТВИТЕЛЬНОСТЬ:</span> <span id="globalVal">1.0</span></label>
            <input type="range" id="globalSens" min="0" max="3" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label><span>Поворот головы (Камера):</span> <span id="headRotVal">1.0</span></label>
            <input type="range" id="headRotSens" min="0" max="3" step="0.1" value="1.0">
        </div>

        <div class="control-group">
            <label><span>Смещение тела (Камера):</span> <span id="faceVal">0.3</span></label>
            <input type="range" id="faceSens" min="0" max="1.0" step="0.01" value="0.3">
        </div>
        
        <div class="control-group">
            <label><span>Наклон телефона (Гироскоп):</span> <span id="gyroVal">0.015</span></label>
            <input type="range" id="gyroSens" min="0" max="0.05" step="0.001" value="0.015">
        </div>
        
        <div class="checkbox-grid">
            <div class="checkbox-group">
                <input type="checkbox" id="invertFaceX">
                <label for="invertFaceX">Тело X (Влево/Вправо)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="invertFaceY">
                <label for="invertFaceY">Тело Y (Вверх/Вниз)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="invertGyroY" checked>
                <label for="invertGyroY">Гироскоп Y (Влево/Вправо)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="invertGyroX" checked>
                <label for="invertGyroX">Гироскоп X (Вверх/Вниз)</label>
            </div>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        /* ==========================================
           1. НАСТРОЙКА СЦЕНЫ И THREE.JS
           ========================================== */
        const scene = new THREE.Scene();

        // Камера помещается в группу для независимой работы гироскопа
        const cameraGroup = new THREE.Group();
        scene.add(cameraGroup);
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        cameraGroup.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Построение комнаты
        const roomGeo = new THREE.BoxGeometry(12, 8, 16);
        const roomMaterials = [
            new THREE.MeshStandardMaterial({ color: 0x457b9d, side: THREE.BackSide }), // Право
            new THREE.MeshStandardMaterial({ color: 0xe63946, side: THREE.BackSide }), // Лево
            new THREE.MeshStandardMaterial({ color: 0xeeeeee, side: THREE.BackSide }), // Потолок
            new THREE.MeshStandardMaterial({ color: 0x1d3557, side: THREE.BackSide }), // Пол
            new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, side: THREE.BackSide }), // Передняя невидимая
            new THREE.MeshStandardMaterial({ color: 0xa8dadc, side: THREE.BackSide })  // Дальняя
        ];
        const room = new THREE.Mesh(roomGeo, roomMaterials);
        room.receiveShadow = true;
        room.position.z = -8; 
        scene.add(room);

        // Декорации
        const grid = new THREE.GridHelper(12, 10, 0xffffff, 0xffffff);
        grid.material.opacity = 0.2; grid.material.transparent = true;
        grid.position.set(0, -3.99, -8);
        scene.add(grid);

        const artifactGeo = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const artifactMat = new THREE.MeshStandardMaterial({ color: 0xffb703, metalness: 0.8, roughness: 0.2 });
        const artifact = new THREE.Mesh(artifactGeo, artifactMat);
        artifact.position.set(0, 0, -8);
        artifact.castShadow = true;
        scene.add(artifact);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const spotLight = new THREE.SpotLight(0xffffff, 1.5);
        spotLight.position.set(0, 3, -4);
        spotLight.castShadow = true;
        scene.add(spotLight);

        /* ==========================================
           2. ПЕРЕМЕННЫЕ УПРАВЛЕНИЯ
           ========================================== */
        let GLOBAL_SENSITIVITY = 1.0; 
        let GYRO_SENSITIVITY = 0.015; 
        let FACE_SENSITIVITY = 0.3;   
        let HEAD_ROT_SENSITIVITY = 1.0; 
        
        const LERP_FACTOR = 0.08;

        // Переменные сглаживания
        let targetRotX = 0, targetRotY = 0, currentRotX = 0, currentRotY = 0;
        let baseBeta = null, baseGamma = null;
        let targetPosX = 0, targetPosY = 0, currentPosX = 0, currentPosY = 0;
        let targetHeadRotX = 0, targetHeadRotY = 0, targetHeadRotZ = 0;
        let currentHeadRotX = 0, currentHeadRotY = 0, currentHeadRotZ = 0;

        // Привязка слайдеров интерфейса
        document.getElementById('globalSens').addEventListener('input', (e) => {
            GLOBAL_SENSITIVITY = parseFloat(e.target.value);
            document.getElementById('globalVal').innerText = GLOBAL_SENSITIVITY.toFixed(1);
        });
        document.getElementById('faceSens').addEventListener('input', (e) => {
            FACE_SENSITIVITY = parseFloat(e.target.value);
            document.getElementById('faceVal').innerText = FACE_SENSITIVITY.toFixed(2);
        });
        document.getElementById('gyroSens').addEventListener('input', (e) => {
            GYRO_SENSITIVITY = parseFloat(e.target.value);
            document.getElementById('gyroVal').innerText = GYRO_SENSITIVITY.toFixed(3);
        });
        document.getElementById('headRotSens').addEventListener('input', (e) => {
            HEAD_ROT_SENSITIVITY = parseFloat(e.target.value);
            document.getElementById('headRotVal').innerText = HEAD_ROT_SENSITIVITY.toFixed(1);
        });

        const invertFaceX = document.getElementById('invertFaceX');
        const invertFaceY = document.getElementById('invertFaceY');
        const invertGyroY = document.getElementById('invertGyroY');
        const invertGyroX = document.getElementById('invertGyroX');

        /* ==========================================
           3. ПОШАГОВАЯ ИНИЦИАЛИЗАЦИЯ (ПО КЛИКУ)
           ========================================== */
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('startButton');
        const statusText = document.getElementById('status');
        let faceLandmarker, lastVideoTime = -1;

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            
            try {
                // ШАГ 1
                statusText.innerText = "Шаг 1: Загрузка ядра (WASM)...";
                // МЕНЯЕМ JSDELIVR НА UNPKG (он реже попадает под блокировки)
                const vision = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.0/wasm");
                
                // ШАГ 2
                statusText.innerText = "Шаг 2: Скачивание нейросети (CPU режим)...";
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        // ИСПОЛЬЗУЕМ ЗЕРКАЛО ДЛЯ ФАЙЛА НЕЙРОСЕТИ
                        modelAssetPath: `face_landmarker.task`, 
                        delegate: "CPU"
                    },
                    outputFaceBlendshapes: false, 
                    outputFacialTransformationMatrixes: true, 
                    runningMode: "VIDEO", 
                    numFaces: 1
                });

                // ШАГ 3
                statusText.innerText = "Шаг 3: Настройка датчиков...";
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') initGyro();
                } else {
                    initGyro();
                }

                // ШАГ 4
                statusText.innerText = "Шаг 4: Запуск камеры...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                video.addEventListener("loadeddata", () => {
                    predictWebcam();
                    // Скрываем загрузочный экран
                    document.getElementById('ui-container').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('ui-container').style.display = 'none';
                        document.getElementById('controls').style.display = 'block'; 
                    }, 500);
                });

            } catch (e) {
                // Вывод реальной ошибки на экран для дебага
                statusText.innerText = "Сбой: " + e.message;
                statusText.style.color = "#e63946";
                startBtn.disabled = false;
                console.error(e);
            }
        });

        /* ==========================================
           4. ЛОГИКА ДАТЧИКОВ
           ========================================== */
        function initGyro() {
            window.addEventListener('deviceorientation', (event) => {
                if (baseBeta === null) { baseBeta = event.beta; baseGamma = event.gamma; }
                if (event.beta !== null && event.gamma !== null) {
                    let deltaBeta = event.beta - baseBeta;
                    let deltaGamma = event.gamma - baseGamma;

                    if (deltaGamma > 180) deltaGamma -= 360;
                    if (deltaGamma < -180) deltaGamma += 360;
                    deltaBeta = Math.max(-35, Math.min(35, deltaBeta));
                    deltaGamma = Math.max(-40, Math.min(40, deltaGamma));

                    let dirY = invertGyroY.checked ? 1 : -1;
                    let dirX = invertGyroX.checked ? 1 : -1;

                    targetRotY = dirY * deltaGamma * GYRO_SENSITIVITY * GLOBAL_SENSITIVITY;
                    targetRotX = dirX * deltaBeta * GYRO_SENSITIVITY * GLOBAL_SENSITIVITY;
                }
            });
        }

        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                if (results.facialTransformationMatrixes && results.facialTransformationMatrixes.length > 0) {
                    const matrixArray = results.facialTransformationMatrixes[0].data;
                    
                    // 1. Смещение тела
                    let rawX = matrixArray[12] / 10; 
                    let rawY = matrixArray[13] / 10;
                    if (invertFaceX.checked) rawX = -rawX; 
                    if (invertFaceY.checked) rawY = -rawY;

                    targetPosX = rawX * FACE_SENSITIVITY * GLOBAL_SENSITIVITY;
                    targetPosY = rawY * FACE_SENSITIVITY * GLOBAL_SENSITIVITY;

                    // 2. Вращение головы (передается камере)
                    const m4 = new THREE.Matrix4().fromArray(matrixArray);
                    const euler = new THREE.Euler().setFromRotationMatrix(m4);

                    targetHeadRotX = euler.x * HEAD_ROT_SENSITIVITY * GLOBAL_SENSITIVITY;
                    targetHeadRotY = -euler.y * HEAD_ROT_SENSITIVITY * GLOBAL_SENSITIVITY; 
                    targetHeadRotZ = -euler.z * HEAD_ROT_SENSITIVITY * GLOBAL_SENSITIVITY;
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        /* ==========================================
           5. АНИМАЦИЯ И РЕНДЕР
           ========================================== */
        function animate() {
            requestAnimationFrame(animate);

            // Декоративное вращение артефакта
            artifact.rotation.x += 0.01;
            artifact.rotation.y += 0.015;

            // Вращение сцены (Гироскоп)
            currentRotX += (targetRotX - currentRotX) * LERP_FACTOR;
            currentRotY += (targetRotY - currentRotY) * LERP_FACTOR;
            cameraGroup.rotation.x = currentRotX;
            cameraGroup.rotation.y = currentRotY;

            // Смещение камеры (Позиция тела)
            currentPosX += (targetPosX - currentPosX) * LERP_FACTOR;
            currentPosY += (targetPosY - currentPosY) * LERP_FACTOR;
            camera.position.x = currentPosX;
            camera.position.y = currentPosY;

            // Свободное вращение камеры (Повороты головы)
            currentHeadRotX += (targetHeadRotX - currentHeadRotX) * LERP_FACTOR;
            currentHeadRotY += (targetHeadRotY - currentHeadRotY) * LERP_FACTOR;
            currentHeadRotZ += (targetHeadRotZ - currentHeadRotZ) * LERP_FACTOR;
            camera.rotation.set(currentHeadRotX, currentHeadRotY, currentHeadRotZ);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
